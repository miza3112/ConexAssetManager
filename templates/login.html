<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-box">

        <img src="{{ url_for('static', filename='img/logo_conex.png') }}" class="login-logo">

<form method="POST">

    <input
        type="text"
        name="usuario"
        placeholder="Usuario"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required
    >

    <button type="submit">
        Iniciar sesión
    </button>

</form>

    </div>

</div>

</body>

</html>
