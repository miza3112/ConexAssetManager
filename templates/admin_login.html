<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Administrador</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-body">

<div class="login-container">

    <div class="login-box">

        <img src="{{ url_for('static', filename='img/logo_conex.png') }}" class="login-logo">

        <form method="POST">

            <input
                type="password"
                name="clave"
                placeholder="Contraseña de administrador"
                required>

            <button type="submit">

                Acceder

            </button>

        </form>

        {% if error %}

        <p class="error">

            {{ error }}

        </p>

        {% endif %}

    </div>

</div>

</body>

</html>
